<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

  <title>Ana & Miguel | 19/06/2027</title>

  <link rel="stylesheet" href="./style.css" />
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#d5b07a">
  <!-- WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Ana & Miguel | 19·06·2027 💍">
<meta property="og:description" content="Os invitamos a compartir con nosotros un día muy especial.">
  <meta property="og:site_name" content="Ana & Miguel">
<meta property="og:locale" content="es_ES">
<meta property="og:image" content="https://anaymiguel.github.io/Invitacion19062027/assets/preview.png">
<meta property="og:image:secure_url" content="https://anaymiguel.github.io/Invitacion19062027/assets/icon-512.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://anaymiguel.github.io/Invitacion19062027/">
  <!-- X / Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ana & Miguel | 19·06·2027">
  <meta name="twitter:image" content="https://anaymiguel.github.io/Invitacion19062027/assets/icon-512.png">
<link rel="icon" href="./assets/icon-192.png">
<link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
</head>

<body>
<div id="app">

  <section class="slide active" id="slide1">
    <button class="music-toggle" id="musicToggle" type="button" aria-label="Activar música">
  🎼
</button>
    <div class="slide-card">
      <button id="startButton" class="hotspot" type="button" aria-label="Pulsa para comenzar el viaje"></button>
    </div>
  </section>

  <section class="slide" id="slide2">
    <button class="back-button" type="button" aria-label="Volver">←</button>
    <div class="slide-card">
      <button class="next hotspot" type="button" aria-label="Descubrir más"></button>
    </div>
  </section>

  <section class="slide" id="slide3">
    <button class="back-button" type="button" aria-label="Volver">←</button>
    <div class="slide-card">
      <button class="next hotspot" type="button" aria-label="Siguiente"></button>
    </div>
  </section>

  <section class="slide" id="slide4">
    <button class="back-button" type="button" aria-label="Volver">←</button>
    <div class="slide-card">
      <button class="next hotspot" type="button" aria-label="Confirmar asistencia"></button>
    </div>
  </section>

  <section class="slide" id="slide5">
    <button class="back-button" type="button" aria-label="Volver">←</button>

    <div class="slide-card form-container">
      <form id="rsvp" autocomplete="on">

<input
  id="nombre"
  name="invitado_nombre"
  type="search"
  inputmode="text"
  autocomplete="new-password"
  autocorrect="off"
  autocapitalize="words"
  spellcheck="false"
  aria-label="Nombre y apellidos"
  required
/>

<select id="personas" name="personas" aria-label="Cuántas personas asistiréis" required>
  <option value="" selected>Selecciona</option>
  <option value="No podré asistir/No podremos asistir">No podré asistir/No Podremos asistir</option>
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
  <option value="6">6</option>
  <option value="7">7</option>
  <option value="8">8</option>
  <option value="9">9</option>
  <option value="10">10</option>
</select>

        <button type="button" class="kids-btn" data-value="Sí" aria-label="Sí vienen niños" aria-pressed="false">Sí</button>

        <button type="button" class="kids-btn active" data-value="No" aria-label="No vienen niños" aria-pressed="true">No</button>

        <input type="hidden" id="ninos" name="ninos" value="No" />

        <select id="cuantosNinos" name="cuantosNinos" aria-label="Cuántos niños" disabled>
          <option value="" selected>Selecciona</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>

        <textarea
          id="alergias"
          name="alergias"
          aria-label="Alergia o intolerancia alimentaria"
        ></textarea>

        <select id="bus" name="bus" aria-label="Uso del autobús">
          <option value="" selected>Selecciona una opción</option>
          <option value="No necesitaría">No necesitaría</option>
          <option value="A la ida">A la ida</option>
          <option value="A la vuelta">A la vuelta</option>
          <option value="A la ida y vuelta">A la ida y vuelta</option>
        </select>

        <textarea
          id="contacto"
          name="contacto"
          maxlength="700"
          data-max-words="100"
          aria-label="Contacto y observaciones"
        ></textarea>

      </form>

      <button class="next hotspot" type="button" aria-label="Siguiente"></button>
    </div>
  </section>

  <section class="slide" id="slide6">
    <button class="back-button" type="button" aria-label="Volver">←</button>

    <div class="slide-card">
      <button id="mapButton" class="hotspot final-hotspot" type="button" aria-label="Cómo llegar"></button>
      <button id="calendarButton" class="hotspot final-hotspot" type="button" aria-label="Añadir al calendario"></button>
      <button id="countdownButton" class="hotspot final-hotspot" type="button" aria-label="Cuenta atrás">
        <span id="countdown"></span>
      </button>
      <button id="send" class="hotspot final-hotspot" type="button" aria-label="Enviar respuesta"></button>
    </div>
  </section>

</div>

<audio id="bgMusic" loop preload="none">
  <source src="./audio/musica.mp3" type="audio/mpeg" />
</audio>

<div id="successModal" class="success-modal">
  <div class="success-box">
    <div class="success-heart">❤️</div>

    <h2 id="successTitle">¡Gracias!</h2>

    <p id="successText">Hemos recibido tu respuesta correctamente.</p>

    <div id="installQuestion" class="install-question">
      <p>
        ¿Quieres añadir esta invitación a la pantalla de inicio de tu móvil?<br><br>
        Tendrás un acceso directo, como si fuera una aplicación,
        para tenerla siempre a mano.
      </p>

      <div class="install-buttons">
        <button id="installYes" type="button">Sí</button>
        <button id="installNo" type="button">No, gracias</button>
      </div>
    </div>

    <button id="closeSuccess" type="button" style="display:none;">Cerrar</button>
  </div>
</div>

<button id="zoomButton" class="zoom-button" type="button" aria-label="Ampliar diapositiva">🔍</button>

<div id="zoomModal" class="zoom-modal">
  <button id="closeZoom" class="close-zoom" type="button">×</button>
  <img id="zoomImage" src="" alt="Diapositiva ampliada">
</div>

<script src="./script.js"></script>
</body>
</html>
